<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trimmer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2d3748;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            color: #1a202c;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: auto;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .shorts-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: #ff0000;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .normal-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            background: #22c55e;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .shorts-info {
            background: #fff5f5;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #991b1b;
            margin-bottom: 18px;
            display: none;
        }

        .music-player {
            margin-top: 10px;
            background: #f0f4ff;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-player audio {
            flex: 1;
            height: 36px;
        }

        .music-player-label {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            white-space: nowrap;
        }

        .progress-box {
            margin-top: 20px;
            background: #f7fafc;
            padding: 18px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
            gap: 10px;
        }

        .progress-bar-wrap {
            background: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 4px;
        }

        .result-box {
            margin-top: 20px;
            background: #f0fdf4;
            border: 2px solid #86efac;
            padding: 20px;
            border-radius: 10px;
        }

        .result-box.error {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .result-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #166534;
        }

        .result-box.error .result-title {
            color: #991b1b;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #374151;
        }

        .meta-item span {
            font-weight: 600;
            color: #111827;
        }

        .result-link {
            display: inline-block;
            padding: 10px 22px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .result-link:hover {
            background: #16a34a;
        }

        .video-preview {
            margin-top: 14px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .video-preview video {
            width: 100%;
            max-height: 400px;
            display: block;
        }

        .batch-section {
            margin-top: 32px;
        }

        .batch-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            transition: border-color 0.2s;
        }

        .batch-item.processing {
            border-color: #667eea;
        }

        .batch-item.done {
            border-color: #22c55e;
        }

        .batch-item.error {
            border-color: #ef4444;
        }

        .batch-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 10px;
        }

        .batch-item-title {
            font-size: 15px;
            font-weight: 700;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .batch-status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-waiting {
            background: #e2e8f0;
            color: #4a5568;
        }

        .badge-processing {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-done {
            background: #dcfce7;
            color: #166534;
        }

        .badge-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .batch-result {
            margin-top: 14px;
            padding: 14px;
            border-radius: 8px;
            background: #f0fdf4;
            border: 1px solid #86efac;
        }

        .batch-result.error {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .batch-result-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: #374151;
            margin-bottom: 12px;
        }

        .batch-result-meta span {
            font-weight: 600;
            color: #111827;
        }

        .batch-progress {
            margin-top: 10px;
            background: #e2e8f0;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .batch-progress-bar {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .batch-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px;
            border: 2px dashed #cbd5e0;
            border-radius: 10px;
            background: transparent;
            color: #718096;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .batch-add-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f0f4ff;
        }

        .batch-add-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .remove-btn {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .remove-btn:hover {
            background: #fecaca;
        }

        .batch-run-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .batch-summary {
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 10px;
            padding: 16px;
            margin-top: 20px;
            display: none;
        }

        .batch-summary-title {
            font-size: 16px;
            font-weight: 700;
            color: #166534;
            margin-bottom: 10px;
        }

        .batch-summary-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #374151;
        }

        .batch-summary-stats span {
            font-weight: 700;
        }

        @media (max-width: 600px) {

            .form-grid,
            .meta-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 26px;
            }

            .batch-summary-stats {
                flex-direction: column;
                gap: 8px;
            }

            .batch-item-header,
            .progress-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Video Trimmer</h1>
            <p>Trim YouTube video · Stack thumbnail · Custom TTS audio</p>
        </div>

        <div class="card">
            <div class="card-title">✂️ Single Video</div>

            <div class="form-group">
                <label>YouTube URL</label>
                <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..."
                    oninput="onYoutubeUrlChange(this, 'videoTypeBadge', 'timeSection', 'shortsInfo')">
                <div id="videoTypeBadge" style="display:none;"></div>
            </div>

            <div class="shorts-info" id="shortsInfo">
                📱 Video Shorts sẽ giữ nguyên toàn bộ độ dài, không cần chọn thời gian.
            </div>

            <div id="timeSection">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Start Time (giây)</label>
                        <input type="number" id="startTime" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>End Time (giây)</label>
                        <input type="number" id="endTime" value="30" min="1">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Audio Mode</label>
                <select id="audioMode" onchange="toggleHookText()">
                    <option value="original">🎵 Original Audio</option>
                    <option value="hook">🎤 Custom Hook (TTS)</option>
                </select>
            </div>

            <div class="form-group" id="hookTextDiv" style="display:none;">
                <label>Hook Text (ElevenLabs TTS)</label>
                <textarea id="hookText" rows="3"
                    placeholder="Nhập nội dung sẽ được chuyển thành giọng nói..."></textarea>
            </div>

            <div class="form-group">
                <label>🎵 Music URL (MP3 link - tuỳ chọn)</label>
                <input type="text" id="musicUrl" placeholder="https://files.catbox.moe/xxx.mp3"
                    oninput="onMusicUrlChange('musicUrl', 'musicPlayerDiv', 'musicPreview')">
                <div class="music-player" id="musicPlayerDiv" style="display:none;">
                    <span class="music-player-label">▶ Preview:</span>
                    <audio id="musicPreview" controls preload="none"></audio>
                </div>
            </div>

            <button class="btn" id="trimBtn" onclick="processTrim()">
                ✂️ Trim & Process Video
            </button>

            <div id="progressWrap" style="display:none;">
                <div class="progress-box">
                    <div class="progress-header">
                        <span id="statusText">Processing...</span>
                        <span id="elapsedTime">0s</span>
                    </div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>
            </div>

            <div id="resultWrap"></div>
        </div>

        <div class="card batch-section">
            <div class="card-title">📋 Batch Processing <small
                    style="font-size:13px;color:#718096;font-weight:400;">(tối đa 5 video)</small></div>

            <div id="batchItems"></div>

            <button class="batch-add-btn" id="batchAddBtn" onclick="addBatchItem()">
                ➕ Thêm video (còn <span id="batchRemain">5</span> slot)
            </button>

            <button class="btn batch-run-btn" id="batchRunBtn" onclick="runBatch()" style="display:none;">
                🚀 Xử lý tất cả (<span id="batchCount">0</span> video)
            </button>

            <div class="batch-summary" id="batchSummary">
                <div class="batch-summary-title">🎉 Batch hoàn thành!</div>
                <div class="batch-summary-stats">
                    <div>✅ Thành công: <span id="summaryDone">0</span></div>
                    <div>❌ Thất bại: <span id="summaryFail">0</span></div>
                    <div>⏱️ Tổng thời gian: <span id="summaryTime">0s</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/trim';
        const MAX_BATCH = 5;
        let batchItems = [];

        function isYoutubeShort(url) {
            return url.includes('youtube.com/shorts/');
        }

        function onYoutubeUrlChange(input, badgeId, timeSectionId, shortsInfoId) {
            const url = input.value.trim();
            const badge = document.getElementById(badgeId);
            const timeSection = document.getElementById(timeSectionId);
            const shortsInfo = document.getElementById(shortsInfoId);

            if (!url.startsWith('http')) {
                badge.style.display = 'none';
                if (timeSection) timeSection.style.display = 'block';
                if (shortsInfo) shortsInfo.style.display = 'none';
                return;
            }

            badge.style.display = 'block';

            if (isYoutubeShort(url)) {
                badge.innerHTML = '<span class="shorts-badge">📱 YouTube Shorts — No thumbnail stack, 480p</span>';
                if (timeSection) timeSection.style.display = 'none';
                if (shortsInfo) shortsInfo.style.display = 'block';
            } else {
                badge.innerHTML = '<span class="normal-badge">🎬 Normal Video — Thumbnail stack enabled</span>';
                if (timeSection) timeSection.style.display = 'block';
                if (shortsInfo) shortsInfo.style.display = 'none';
            }
        }

        function toggleHookText() {
            const mode = document.getElementById('audioMode').value;
            document.getElementById('hookTextDiv').style.display = mode === 'hook' ? 'block' : 'none';
        }

        function onMusicUrlChange(inputId, playerDivId, audioId) {
            const url = document.getElementById(inputId).value.trim();
            const playerDiv = document.getElementById(playerDivId);
            const audio = document.getElementById(audioId);

            if (url.startsWith('http')) {
                audio.src = url;
                playerDiv.style.display = 'flex';
            } else {
                playerDiv.style.display = 'none';
                audio.src = '';
            }
        }

        function buildResultHTML(data) {
            if (!data.success) {
                return `<div class="result-box error">
                    <div class="result-title">❌ Xử lý thất bại</div>
                    <p style="font-size:14px;color:#7f1d1d;">${data.details || data.error || 'Unknown error'}</p>
                </div>`;
            }

            const m = data.metadata || {};

            return `<div class="result-box">
                <div class="result-title">✅ Video processed successfully!</div>
                <div class="meta-grid">
                    <div class="meta-item">Duration: <span>${typeof m.duration === 'number' ? m.duration.toFixed(1) : 0}s</span></div>
                    <div class="meta-item">Final: <span>${typeof m.finalDuration === 'number' ? m.finalDuration.toFixed(1) : 0}s</span></div>
                    <div class="meta-item">Audio: <span>${m.audioMode || 'original'}</span></div>
                    <div class="meta-item">Processing: <span>${m.processingTime || 0}s</span></div>
                    <div class="meta-item">Upload: <span>${m.uploadTime || 0}s</span></div>
                    <div class="meta-item">Service: <span>${data.uploadService || '-'} ${data.permanent ? '(Permanent)' : '(Temp)'}</span></div>
                </div>
                <a href="${data.videoUrl}" target="_blank" rel="noopener noreferrer" class="result-link">📥 Download / View Video</a>
                <div class="video-preview">
                    <video controls preload="metadata">
                        <source src="${data.videoUrl}" type="video/mp4">
                        Trình duyệt không hỗ trợ video preview.
                    </video>
                </div>
            </div>`;
        }

        async function createTrimJob(payload) {
            const res = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data.success || !data.jobId) {
                throw new Error(data.details || data.error || 'Không tạo được job');
            }

            return data;
        }

        async function getJobStatus(jobId) {
            const res = await fetch(`${API_BASE}/${jobId}`);
            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data.success) {
                throw new Error(data.error || 'Không lấy được trạng thái job');
            }

            return data;
        }

        async function pollJob(jobId, onUpdate, interval = 3000, timeoutMs = 30 * 60 * 1000) {
            const started = Date.now();

            while (true) {
                if (Date.now() - started > timeoutMs) {
                    throw new Error('Quá thời gian chờ job hoàn thành');
                }

                const job = await getJobStatus(jobId);
                onUpdate(job);

                if (job.status === 'done') return job.result;
                if (job.status === 'failed') {
                    throw new Error(job.error || job.message || 'Job failed');
                }

                await new Promise(resolve => setTimeout(resolve, interval));
            }
        }

        async function processTrim() {
            const youtubeUrl = document.getElementById('youtubeUrl').value.trim();
            const isShort = isYoutubeShort(youtubeUrl);
            const startTime = isShort ? 0 : parseFloat(document.getElementById('startTime').value);
            const endTime = isShort ? null : parseFloat(document.getElementById('endTime').value);
            const audioMode = document.getElementById('audioMode').value;
            const hookText = document.getElementById('hookText').value.trim();
            const musicUrl = document.getElementById('musicUrl').value.trim();

            if (!youtubeUrl) return alert('Vui lòng nhập YouTube URL');
            if (!isShort && endTime <= startTime) return alert('End time phải lớn hơn Start time');
            if (audioMode === 'hook' && !hookText) return alert('Vui lòng nhập Hook Text');

            const btn = document.getElementById('trimBtn');
            const progressWrap = document.getElementById('progressWrap');
            const resultWrap = document.getElementById('resultWrap');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            const elapsedTime = document.getElementById('elapsedTime');

            btn.disabled = true;
            btn.textContent = '⏳ Đang tạo job...';
            progressWrap.style.display = 'block';
            resultWrap.innerHTML = '';
            progressBar.style.width = '5%';
            progressBar.style.background = 'linear-gradient(90deg,#667eea,#764ba2)';
            statusText.textContent = 'Đang gửi yêu cầu...';
            elapsedTime.textContent = '0s';

            const t0 = Date.now();
            const timer = setInterval(() => {
                elapsedTime.textContent = ((Date.now() - t0) / 1000).toFixed(0) + 's';
            }, 500);

            try {
                const job = await createTrimJob({
                    youtubeUrl,
                    startTime,
                    endTime,
                    audioMode,
                    hookText: audioMode === 'hook' ? hookText : '',
                    musicUrl: musicUrl || '',
                    isShort
                });

                statusText.textContent = job.message || `Đã tạo job ${job.jobId}`;
                progressBar.style.width = `${job.progress || 10}%`;
                btn.textContent = '⏳ Đang xử lý...';

                const result = await pollJob(job.jobId, (jobStatus) => {
                    progressBar.style.width = `${typeof jobStatus.progress === 'number' ? jobStatus.progress : 10}%`;
                    statusText.textContent = jobStatus.message || 'Đang xử lý video...';
                });

                progressBar.style.width = '100%';
                statusText.textContent = '✅ Hoàn thành!';
                resultWrap.innerHTML = buildResultHTML(result);
            } catch (err) {
                progressBar.style.width = '100%';
                progressBar.style.background = '#ef4444';
                statusText.textContent = '❌ Lỗi';
                resultWrap.innerHTML = `
                    <div class="result-box error">
                        <div class="result-title">❌ Xử lý thất bại</div>
                        <p style="font-size:14px;color:#7f1d1d;">${err.message}</p>
                    </div>`;
            } finally {
                clearInterval(timer);
                btn.disabled = false;
                btn.textContent = '✂️ Trim & Process Video';
            }
        }

        function updateBatchUI() {
            const count = batchItems.length;
            document.getElementById('batchRemain').textContent = MAX_BATCH - count;
            document.getElementById('batchCount').textContent = count;
            document.getElementById('batchAddBtn').disabled = count >= MAX_BATCH;
            document.getElementById('batchRunBtn').style.display = count > 0 ? 'block' : 'none';
        }

        function addBatchItem() {
            if (batchItems.length >= MAX_BATCH) return;
            const id = Date.now() + Math.floor(Math.random() * 1000);
            batchItems.push({ id, status: 'waiting' });
            renderBatchItem(id, batchItems.length);
            updateBatchUI();
        }

        function removeBatchItem(id) {
            batchItems = batchItems.filter(i => i.id !== id);
            const node = document.getElementById(`batch-${id}`);
            if (node) node.remove();

            document.querySelectorAll('.batch-item-title .batch-num').forEach((el, idx) => {
                el.textContent = `Video #${idx + 1}`;
            });

            updateBatchUI();
        }

        function renderBatchItem(id, index) {
            const container = document.getElementById('batchItems');
            const div = document.createElement('div');
            div.className = 'batch-item';
            div.id = `batch-${id}`;
            div.innerHTML = `
                <div class="batch-item-header">
                    <div class="batch-item-title">
                        🎬 <span class="batch-num">Video #${index}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="batch-status-badge badge-waiting" id="status-${id}">⏳ Chờ</span>
                        <button class="remove-btn" onclick="removeBatchItem(${id})">✕ Xóa</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>YouTube URL</label>
                    <input type="text" id="burl-${id}"
                        placeholder="https://www.youtube.com/watch?v=..."
                        oninput="onYoutubeUrlChange(this, 'bbadge-${id}', 'btime-${id}', 'bshorts-${id}')">
                    <div id="bbadge-${id}" style="display:none;"></div>
                </div>

                <div class="shorts-info" id="bshorts-${id}">
                    📱 Shorts — giữ nguyên toàn bộ độ dài.
                </div>

                <div id="btime-${id}">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Start Time (giây)</label>
                            <input type="number" id="bstart-${id}" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>End Time (giây)</label>
                            <input type="number" id="bend-${id}" value="30" min="1">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎵 Music URL (tuỳ chọn)</label>
                    <input type="text" id="bmusic-${id}"
                        placeholder="https://files.catbox.moe/xxx.mp3"
                        oninput="onMusicUrlChange('bmusic-${id}', 'bplayer-${id}', 'baudio-${id}')">
                    <div class="music-player" id="bplayer-${id}" style="display:none;">
                        <span class="music-player-label">▶ Preview:</span>
                        <audio id="baudio-${id}" controls preload="none"></audio>
                    </div>
                </div>

                <div class="batch-progress" id="bprog-${id}" style="display:none;">
                    <div class="batch-progress-bar" id="bprogbar-${id}"></div>
                </div>

                <div id="bresult-${id}"></div>
            `;
            container.appendChild(div);
        }

        function setBatchStatus(id, status, label) {
            const el = document.getElementById(`status-${id}`);
            const item = document.getElementById(`batch-${id}`);
            const badges = {
                waiting: 'badge-waiting',
                processing: 'badge-processing',
                done: 'badge-done',
                error: 'badge-error'
            };

            el.className = `batch-status-badge ${badges[status]}`;
            el.textContent = label;
            item.className = `batch-item ${status === 'waiting' ? '' : status}`;
        }

        function setBatchProgress(id, pct) {
            const prog = document.getElementById(`bprog-${id}`);
            const bar = document.getElementById(`bprogbar-${id}`);
            prog.style.display = 'block';
            bar.style.width = pct + '%';
        }

        async function processBatchItem(id) {
            const youtubeUrl = document.getElementById(`burl-${id}`).value.trim();
            if (!youtubeUrl) {
                setBatchStatus(id, 'error', '❌ Thiếu URL');
                return { success: false };
            }

            const isShort = isYoutubeShort(youtubeUrl);
            const startTime = isShort ? 0 : parseFloat(document.getElementById(`bstart-${id}`).value);
            const endTime = isShort ? null : parseFloat(document.getElementById(`bend-${id}`).value);
            const musicUrl = document.getElementById(`bmusic-${id}`).value.trim();

            if (!isShort && endTime <= startTime) {
                setBatchStatus(id, 'error', '❌ End > Start');
                document.getElementById(`bresult-${id}`).innerHTML =
                    `<div class="batch-result error"><b>❌ End time phải lớn hơn Start time</b></div>`;
                return { success: false };
            }

            setBatchStatus(id, 'processing', '🔄 Đang tạo job...');
            setBatchProgress(id, 5);

            try {
                const job = await createTrimJob({
                    youtubeUrl,
                    startTime,
                    endTime,
                    audioMode: 'original',
                    hookText: '',
                    musicUrl: musicUrl || '',
                    isShort
                });

                setBatchStatus(id, 'processing', job.message || '🔄 Đang xử lý...');
                setBatchProgress(id, job.progress || 10);

                const result = await pollJob(job.jobId, (jobStatus) => {
                    setBatchStatus(id, 'processing', jobStatus.message || '🔄 Đang xử lý...');
                    setBatchProgress(id, typeof jobStatus.progress === 'number' ? jobStatus.progress : 10);
                });

                setBatchProgress(id, 100);
                setBatchStatus(id, 'done', '✅ Xong');

                const m = result.metadata || {};
                document.getElementById(`bresult-${id}`).innerHTML = `
                    <div class="batch-result">
                        <div style="font-weight:700;color:#166534;margin-bottom:10px;">✅ Thành công!</div>
                        <div class="batch-result-meta">
                            <div>Duration: <span>${typeof m.duration === 'number' ? m.duration.toFixed(1) : 0}s</span></div>
                            <div>Final: <span>${typeof m.finalDuration === 'number' ? m.finalDuration.toFixed(1) : 0}s</span></div>
                            <div>Processing: <span>${m.processingTime || 0}s</span></div>
                            <div>Service: <span>${result.uploadService || '-'}</span></div>
                        </div>
                        <a href="${result.videoUrl}" target="_blank" rel="noopener noreferrer" class="result-link" style="margin-bottom:12px;display:inline-block;">
                            📥 Download / View
                        </a>
                        <div class="video-preview">
                            <video controls preload="metadata">
                                <source src="${result.videoUrl}" type="video/mp4">
                            </video>
                        </div>
                    </div>`;

                return { success: true };
            } catch (err) {
                setBatchProgress(id, 100);
                document.getElementById(`bprogbar-${id}`).style.background = '#ef4444';
                setBatchStatus(id, 'error', '❌ Lỗi');
                document.getElementById(`bresult-${id}`).innerHTML =
                    `<div class="batch-result error"><b>❌ Thất bại:</b> ${err.message}</div>`;
                return { success: false };
            }
        }

        async function runBatch() {
            if (batchItems.length === 0) return alert('Chưa có video nào trong danh sách');

            const runBtn = document.getElementById('batchRunBtn');
            const addBtn = document.getElementById('batchAddBtn');

            runBtn.disabled = true;
            runBtn.textContent = '⏳ Đang xử lý batch...';
            addBtn.disabled = true;
            document.getElementById('batchSummary').style.display = 'none';

            const batchStart = Date.now();
            let done = 0, fail = 0;

            for (const item of batchItems) {
                const result = await processBatchItem(item.id);
                if (result.success) done++;
                else fail++;
            }

            const totalTime = ((Date.now() - batchStart) / 1000).toFixed(0);
            document.getElementById('summaryDone').textContent = done;
            document.getElementById('summaryFail').textContent = fail;
            document.getElementById('summaryTime').textContent = totalTime + 's';
            document.getElementById('batchSummary').style.display = 'block';

            runBtn.disabled = false;
            runBtn.textContent = `🚀 Xử lý tất cả (${batchItems.length} video)`;
            addBtn.disabled = batchItems.length >= MAX_BATCH;
        }
    </script>
</body>

</html>
